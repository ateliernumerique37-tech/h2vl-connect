# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  maxInstances: 1
  invoker: public
  timeoutSeconds: 300

env:
  - variable: EMAIL_HOST
    value: smtp.gmail.com
    availability:
      - RUNTIME
  - variable: EMAIL_PORT
    value: "465"
    availability:
      - RUNTIME
  - variable: EMAIL_USER
    value: ateliernumerique37@gmail.com
    availability:
      - RUNTIME
  - variable: EMAIL_PASS
    secret: email-pass
    availability:
      - BUILD
      - RUNTIME
  - variable: EMAIL_FROM_NAME
    value: "Gestion de l'association H2VL"
    availability:
      - RUNTIME
  - variable: CRON_SECRET
    secret: cron-secret
    availability:
      - BUILD
      - RUNTIME
